services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: mythra/api:0.1.0
    container_name: mythra-api

    ports:
      - "5080:5080"

    environment:
      ASPNETCORE_URLS: "http://+:5080"
      ConnectionStrings__Default: "Data Source=/data/mythra.db;Cache=Shared;Foreign Keys=true;"
      Jwt__Secret: "${MYTHRA_JWT_SECRET:-change-me-please-32-chars-min!!!!!!!}"
      Metadata__TmdbApiKey: "${TMDB_API_KEY:-}"
      Metadata__GoogleBooksApiKey: "${GOOGLE_BOOKS_API_KEY:-}"
      Ffmpeg__TranscodeRoot: "/transcode"

    volumes:
      - mythra-data:/data
      - ./media:/media:ro
      - mythra-transcode:/transcode

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/5080 && echo -e \"GET /api/v1/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | head -1 | grep -q 200'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: mythra/web:0.1.0
    container_name: mythra-web

    ports:
      - "3000:3000"

    environment:
      # Proxy interno do servidor Next.js → API (não exposto ao browser)
      API_INTERNAL_ORIGIN: "http://api:5080"

    depends_on:
      api:
        condition: service_healthy

    restart: unless-stopped

volumes:
  mythra-data:
  mythra-transcode: